# Google Cloud Build — build & push image, deploy to Cloud Run.
# Trigger: connect repo in Cloud Build → Triggers → include only backend/** (see docs).
#
# Uses BUILD_ID for the immutable tag (always set). SHORT_SHA is empty for `gcloud builds submit`
# from a local folder unless you pass --substitutions=SHORT_SHA=...
#
# Required substitutions (set in trigger or replace defaults):
#   _REGION, _AR_REPO, _SERVICE_NAME
#
# Prerequisite: Artifact Registry repository `_AR_REPO` in `_REGION`.

substitutions:
  _REGION: us-central1
  _AR_REPO: purchase-management-docker
  _SERVICE_NAME: purchase-management-api

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: build-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${BUILD_ID}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest'
      - '-f'
      - backend/Dockerfile
      - backend

  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${BUILD_ID}'

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest'

  - id: deploy-cloud-run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${BUILD_ID}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--port=8080'
      - '--memory=512Mi'
      - '--allow-unauthenticated'
      - '--quiet'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${BUILD_ID}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest'

